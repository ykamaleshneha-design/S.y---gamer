<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Galaxy Fighter</title>
    <style>
        body {
            margin: 0;
            background: #010105;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
            touch-action: none;
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: #000;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #ui-layer {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            font-size: 18px;
            font-weight: bold;
            text-shadow: 0 0 10px #00d2ff;
            pointer-events: none;
        }

        #boss-health-bar {
            display: none;
            position: absolute;
            top: 60px;
            left: 10%;
            width: 80%;
            height: 12px;
            background: #222;
            border: 2px solid #ff3333;
            border-radius: 6px;
            overflow: hidden;
            box-shadow: 0 0 10px #ff0000;
        }

        #boss-fill {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #ff0000, #ff6666);
        }

        #screen-overlay {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            background: rgba(3, 5, 20, 0.95);
            padding: 35px;
            border-radius: 16px;
            border: 2px solid #00d2ff;
            min-width: 280px;
            box-shadow: 0 0 30px rgba(0, 210, 255, 0.6);
        }

        #overlay-title {
            font-size: 34px;
            font-weight: bold;
            margin-bottom: 12px;
            color: #00d2ff;
            letter-spacing: 2px;
            text-shadow: 0 0 15px #00d2ff;
        }

        #overlay-text {
            font-size: 16px;
            margin-bottom: 15px;
            line-height: 1.6;
            color: #b0c4de;
        }

        #credits {
            font-size: 14px;
            color: #00ffcc;
            margin-top: 10px;
            font-weight: bold;
        }

        button {
            margin-top: 15px;
            padding: 12px 35px;
            font-size: 18px;
            background: linear-gradient(135deg, #00d2ff, #0066ff);
            border: none;
            color: white;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 0 15px #00d2ff;
            transition: 0.2s;
        }

        button:hover {
            box-shadow: 0 0 25px #fff;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="ui-layer">
            <div>SCORE: <span id="score">0</span></div>
            <div>LIVES: <span id="lives">❤️❤️❤️</span></div>
        </div>
        
        <div id="boss-health-bar">
            <div id="boss-fill"></div>
        </div>

        <div id="screen-overlay">
            <div id="overlay-title">GALAXY FIGHTER</div>
            <div id="overlay-text">Drag anywhere to pilot.<br>Advanced ship configuration loaded.</div>
            <div id="credits">Developed by Suraj Yadav</div>
            <button id="action-btn" onclick="startGame()">LAUNCH</button>
        </div>

        <canvas id="gameCanvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();

        let score = 0;
        let lives = 3;
        let isGameOver = false;
        let gameActive = false;
        let weaponLevel = 1;
        let bossActive = false;

        const scoreDisplay = document.getElementById("score");
        const livesDisplay = document.getElementById("lives");
        const overlay = document.getElementById("screen-overlay");
        const overlayTitle = document.getElementById("overlay-title");
        const overlayText = document.getElementById("overlay-text");
        const actionBtn = document.getElementById("action-btn");
        const bossBar = document.getElementById("boss-health-bar");
        const bossFill = document.getElementById("boss-fill");

        let stars = [];
        let planets = [];
        let player = {};
        let bullets = [];
        let enemyBullets = [];
        let enemies = [];
        let powerUps = [];
        let boss = null;

        // Generate Stars Background
        for(let i=0; i<50; i++) {
            stars.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, size: Math.random()*2+1, speed: Math.random()*1.5+0.5 });
        }

        // Space Planets Setup
        function initPlanets() {
            planets = [
                { x: canvas.width * 0.2, y: -150, radius: 60, color1: "#4b0082", color2: "#9400d3", speed: 0.3, spots: true },
                { x: canvas.width * 0.7, y: -400, radius: 45, color1: "#e9692c", color2: "#5e2106", speed: 0.2, spots: false }
            ];
        }

        function initGameObjects() {
            score = 0;
            lives = 3;
            weaponLevel = 1;
            isGameOver = false;
            bossActive = false;
            boss = null;
            bullets = [];
            enemyBullets = [];
            enemies = [];
            powerUps = [];
            initPlanets();

            player = {
                x: canvas.width / 2 - 25,
                y: canvas.height - 150,
                width: 55,
                height: 55,
                lastShot: 0,
                shootDelay: 160 
            };

            scoreDisplay.innerText = score;
            livesDisplay.innerText = "❤️❤️❤️";
            bossBar.style.display = "none";
            spawnEnemyWave(); // Pehle waves yahan setup hoti thi
        }

        // Smooth Drag Control System
        let isDragging = false;
        let touchOffsetX = 0;
        let touchOffsetY = 0;

        canvas.addEventListener("touchstart", (e) => {
            if (!gameActive || isGameOver) return;
            const touch = e.touches[0];
            isDragging = true;
            touchOffsetX = touch.clientX - player.x;
            touchOffsetY = touch.clientY - player.y;
        });

        canvas.addEventListener("touchmove", (e) => {
            if (!isDragging || !gameActive || isGameOver) return;
            e.preventDefault();
            const touch = e.touches[0];
            
            player.x = touch.clientX - touchOffsetX;
            player.y = touch.clientY - touchOffsetY;

            // Boundaries
            if (player.x < 0) player.x = 0;
            if (player.x > canvas.width - player.width) player.x = canvas.width - player.width;
            if (player.y < canvas.height * 0.3) player.y = canvas.height * 0.3;
            if (player.y > canvas.height - player.height) player.y = canvas.height - player.height;
        });

        canvas.addEventListener("touchend", () => {
            isDragging = false;
        });

        function startGame() {
            if (!gameActive) {
                initGameObjects();
                gameActive = true;
                overlay.style.display = "none";
                spawnEnemyWave(); // 🚀 FIX: Game shuru hote hi dushman aane lagenge
                animate();
            } else if (isGameOver) {
                initGameObjects();
                isGameOver = false;
                overlay.style.display = "none";
                spawnEnemyWave(); // 🚀 FIX: Restart karne par bhi dushman aayenge
            }
        }

        function spawnEnemyWave() {
            if (!gameActive || isGameOver || bossActive) return;
            let count = 3 + Math.floor(score / 15);
            if (count > 8) count = 8;

            if (score > 0 && score % 40 === 0 && !boss) {
                spawnBoss();
                return;
            }

            for (let i = 0; i < count; i++) {
                enemies.push({
                    x: Math.random() * (canvas.width - 40),
                    y: -50 - (Math.random() * 200),
                    width: 40,
                    height: 40,
                    speed: 1.5 + (Math.random() * 2) + (score * 0.02),
                    hp: 1 + Math.floor(score / 50),
                    lastShot: 0,
                    shootInterval: 2000 + Math.random() * 1500
                });
            }
        }

        function spawnBoss() {
            bossActive = true;
            bossBar.style.display = "block";
            boss = {
                x: canvas.width / 2 - 60,
                y: -100,
                width: 120,
                height: 80,
                maxHp: 20 + (score * 0.5),
                hp: 20 + (score * 0.5),
                speed: 2,
                dir: 1,
                lastShot: 0
            };
        }

        function update() {
            // Stars Scroll
            stars.forEach(s => {
                s.y += s.speed;
                if (s.y > canvas.height) {
                    s.y = 0;
                    s.x = Math.random() * canvas.width;
                }
            });

            // Planets Scroll
            planets.forEach(p => {
                p.y += p.speed;
                if (p.y > canvas.height + p.radius * 2) {
                    p.y = -p.radius * 2;
                    p.x = Math.random() * canvas.width;
                }
            });

            if (gameActive && !isGameOver) {
                // Auto Shooting Logic
                const now = Date.now();
                if (now - player.lastShot > player.shootDelay) {
                    if (weaponLevel === 1) {
                        bullets.push({ x: player.x + player.width / 2 - 3, y: player.y, w: 6, h: 15, speed: 7 });
                    } else if (weaponLevel === 2) {
                        bullets.push({ x: player.x + 10, y: player.y, w: 6, h: 15, speed: 7 });
                        bullets.push({ x: player.x + player.width - 16, y: player.y, w: 6, h: 15, speed: 7 });
                    } else {
                        bullets.push({ x: player.x + player.width / 2 - 3, y: player.y, w: 6, h: 15, speed: 7 });
                        bullets.push({ x: player.x + 5, y: player.y + 10, w: 6, h: 15, speed: 7, angle: -0.1 });
                        bullets.push({ x: player.x + player.width - 11, y: player.y + 10, w: 6, h: 15, speed: 7, angle: 0.1 });
                    }
                    player.lastShot = now;
                }
            }

            // Move Bullets
            bullets.forEach((b, index) => {
                b.y -= b.speed;
                if (b.angle) b.x += b.angle * b.speed;
                if (b.y < -20) bullets.splice(index, 1);
            });

            // Move Enemy Bullets
            enemyBullets.forEach((eb, index) => {
                eb.y += eb.speed;
                if (eb.y > canvas.height + 20) {
                    enemyBullets.splice(index, 1);
                } else if (checkCollision(eb, player)) {
                    enemyBullets.splice(index, 1);
                    playerHit();
                }
            });

            // Boss Logic
            if (boss) {
                if (boss.y < 80) boss.y += 1;
                else {
                    boss.x += boss.speed * boss.dir;
                    if (boss.x < 10 || boss.x > canvas.width - boss.width - 10) boss.dir *= -1;
                }

                // Boss Shoot
                if (Date.now() - boss.lastShot > 1200) {
                    enemyBullets.push({ x: boss.x + boss.width / 2, y: boss.y + boss.height, w: 8, h: 18, speed: 4.5 });
                    boss.lastShot = Date.now();
                }

                // Collision with player bullets
                bullets.forEach((b, bIdx) => {
                    if (checkCollision(b, boss)) {
                        bullets.splice(bIdx, 1);
                        boss.hp--;
                        bossFill.style.width = `${(boss.hp / boss.maxHp) * 100}%`;
                        if (boss.hp <= 0) {
                            score += 25;
                            scoreDisplay.innerText = score;
                            boss = null;
                            bossActive = false;
                            bossBar.style.display = "none";
                            powerUps.push({ x: boss.x + boss.width / 2, y: boss.y, width: 25, height: 25, type: 'weapon' });
                            setTimeout(spawnEnemyWave, 3000);
                        }
                    }
                });

                if (checkCollision(player, boss)) playerHit();
            }

            // Move Enemies & AI Shooting
            enemies.forEach((e, index) => {
                e.y += e.speed;
                if (e.y > canvas.height + 40) {
                    enemies.splice(index, 1);
                    if (enemies.length === 0) spawnEnemyWave();
                }

                if (Date.now() - e.lastShot > e.shootInterval && e.y > 0) {
                    enemyBullets.push({ x: e.x + e.width / 2 - 3, y: e.y + e.height, w: 6, h: 14, speed: 4 });
                    e.lastShot = Date.now();
                }

                // Bullet hits enemy
                bullets.forEach((b, bIndex) => {
                    if (checkCollision(b, e)) {
                        bullets.splice(bIndex, 1);
                        e.hp--;
                        if (e.hp <= 0) {
                            enemies.splice(index, 1);
                            score++;
                            scoreDisplay.innerText = score;
                            if (Math.random() < 0.12) {
                                powerUps.push({ x: e.x, y: e.y, width: 22, height: 22, type: Math.random() < 0.4 ? 'life' : 'weapon' });
                            }
                            if (enemies.length === 0) spawnEnemyWave();
                        }
                    }
                });

                if (checkCollision(player, e)) {
                    enemies.splice(index, 1);
                    playerHit();
                    if (enemies.length === 0) spawnEnemyWave();
                }
            });

            // Move Powerups
            powerUps.forEach((p, index) => {
                p.y += 2;
                if (p.y > canvas.height + 30) powerUps.splice(index, 1);
                else if (checkCollision(p, player)) {
                    if (p.type === 'weapon') {
                        if (weaponLevel < 3) weaponLevel++;
                    } else {
                        if (lives < 3) { lives++; updateLivesUI(); }
                    }
                    powerUps.splice(index, 1);
                }
            });
        }

        function playerHit() {
            lives--;
            updateLivesUI();
            if (lives <= 0) {
                isGameOver = true;
                gameActive = false;
                overlayTitle.innerText = "GAME OVER";
                overlayText.innerHTML = `Final Score: <span style='color:#fff; font-size:24px'>${score}</span><br>Galaxy defenses breached.`;
                actionBtn.innerText = "REDEPLOY";
                overlay.style.display = "block";
            }
        }

        function updateLivesUI() {
            let hearts = "";
            for (let i = 0; i < lives; i++) hearts += "❤️";
            livesDisplay.innerText = hearts || "☠️";
        }

        function checkCollision(rect1, rect2) {
            const r1x = rect1.x, r1y = rect1.y, r1w = rect1.w || rect1.width, r1h = rect1.h || rect1.height;
            const r2x = rect2.x, r2y = rect2.y, r2w = rect2.w || rect2.width, r2h = rect2.h || rect2.height;
            return r1x < r2x + r2w && r1x + r1w > r2x && r1y < r2y + r2h && r1y + r1h > r2y;
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Stars
            ctx.fillStyle = "#fff";
            stars.forEach(s => ctx.fillRect(s.x, s.y, s.size, s.size));

            // Planets
            planets.forEach(p => {
                let grad = ctx.createRadialGradient(p.x - p.radius * 0.2, p.y - p.radius * 0.2, p.radius * 0.1, p.x, p.y, p.radius);
                grad.addColorStop(0, p.color2);
                grad.addColorStop(1, p.color1);
                ctx.fillStyle = grad;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fill();
            });

            // Player Ship
            if (!isGameOver && gameActive) {
                ctx.fillStyle = "#00d2ff";
                ctx.beginPath();
                ctx.moveTo(player.x + player.width / 2, player.y);
                ctx.lineTo(player.x, player.y + player.height);
                ctx.lineTo(player.x + player.width, player.y + player.height);
                ctx.closePath();
                ctx.fill();

                ctx.fillStyle = "#0066ff";
                ctx.fillRect(player.x + player.width / 4, player.y + player.height * 0.6, player.width / 2, player.height * 0.4);
                
                ctx.fillStyle = "#ff6600";
                ctx.fillRect(player.x + player.width / 2 - 4, player.y + player.height, 8, 10 + Math.random() * 10);
            }

            // Bullets
            ctx.fillStyle = "#00ffcc";
            bullets.forEach(b => ctx.fillRect(b.x, b.y, b.w, b.h));

            // Enemy Bullets
            ctx.fillStyle = "#ff3333";
            enemyBullets.forEach(eb => ctx.fillRect(eb.x, eb.y, eb.w || eb.width, eb.h || eb.height));

            // Enemies
            enemies.forEach(e => {
                ctx.fillStyle = "#a900ff";
                ctx.fillRect(e.x, e.y, e.width, e.height);
                ctx.fillStyle = "#ff0055";
                ctx.fillRect(e.x + 6, e.y + 10, 8, 8);
                ctx.fillRect(e.x + e.width - 14, e.y + 10, 8, 8);
            });

            // Boss
            if (boss) {
                ctx.fillStyle = "#ff0000";
                ctx.fillRect(boss.x, boss.y, boss.width, boss.height);
                ctx.fillStyle = "#ffff00";
                ctx.fillRect(boss.x + 20, boss.y + 30, 20, 10);
                ctx.fillRect(boss.x + boss.width - 40, boss.y + 30, 20, 10);
            }

            // Powerups
            powerUps.forEach(p => {
                ctx.fillStyle = p.type === 'weapon' ? "#ffff00" : "#ff00ff";
                ctx.beginPath();
                ctx.arc(p.x + p.width / 2, p.y + p.height / 2, p.width / 2, 0, Math.PI * 2);
                ctx.fill();
            });
        }

        function animate() {
            update();
            draw();
            requestAnimationFrame(animate);
        }

        window.addEventListener("resize", resizeCanvas);
        
        // Initial setup
        initPlanets();
        draw();
        overlay.style.display = "block";
    </script>
</body>
</html>
